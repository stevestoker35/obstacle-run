<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obstacle Run!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { border: 2px solid #333; border-radius: 8px; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(0,0,0,0.88); color: #fff; z-index: 10;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: 52px; margin-bottom: 10px; }
  .overlay p { font-size: 18px; margin: 5px 0; color: #ccc; }
  .key { color: #FFD700; font-weight: bold; }
  .btn { padding: 14px 36px; font-size: 22px; cursor: pointer; border: 2px solid #555; border-radius: 12px; font-weight: bold; color: #fff; background: #444; transition: 0.2s; margin: 10px; }
  .btn:hover { background: #666; transform: scale(1.05); }
  #startScreen h1 { color: #ff6644; text-shadow: 0 0 20px #ff4400; }
  #deathScreen h1 { color: #ff4444; font-size: 48px; }
  #winScreen h1 { color: #44ff66; font-size: 48px; text-shadow: 0 0 20px #22cc44; }
  .level-select { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 15px 0; }
  .lvl-btn { padding: 10px 18px; font-size: 16px; cursor: pointer; border: 2px solid #555; border-radius: 8px; color: #fff; background: #333; font-weight: bold; transition: 0.2s; }
  .lvl-btn:hover { background: #555; border-color: #888; }
  .lvl-btn.locked { opacity: 0.4; cursor: not-allowed; }
  .lvl-btn.completed { border-color: #44ff66; color: #44ff66; }
  .lvl-btn.current { border-color: #FFD700; color: #FFD700; }
</style>
</head>
<body>

<div id="startScreen" class="overlay">
  <h1>OBSTACLE RUN!</h1>
  <p><span class="key">Arrow Keys / WASD</span> — Move &nbsp; <span class="key">SPACE / UP</span> — Jump</p>
  <p><span class="key">SPACE (in air)</span> — Double Jump &nbsp; <span class="key">DOWN / S</span> — Slide</p>
  <p>Get through each level's obstacles to win!</p>
  <div class="level-select" id="levelSelect"></div>
  <button class="btn" onclick="startGame(selectedLevel)">PLAY</button>
</div>

<div id="deathScreen" class="overlay hidden">
  <h1>WRECKED!</h1>
  <p>Level: <span id="deathLevel">1</span></p>
  <p id="deathMsg"></p>
  <button class="btn" onclick="startGame(currentLevel)">RETRY</button>
  <button class="btn" onclick="showStart()">LEVELS</button>
</div>

<div id="winScreen" class="overlay hidden">
  <h1>LEVEL COMPLETE!</h1>
  <p>Level <span id="winLevel">1</span> cleared!</p>
  <p id="winTime"></p>
  <button class="btn" onclick="startGame(currentLevel+1)" id="nextBtn">NEXT LEVEL</button>
  <button class="btn" onclick="showStart()">LEVELS</button>
</div>

<canvas id="game" width="960" height="540"></canvas>

const TOTAL_LEVELS = 25;

// ============= LEVEL SELECT =============
function buildLevelSelect() {
  let sel = document.getElementById('levelSelect');
  sel.innerHTML = '';
  for (let i = 1; i <= TOTAL_LEVELS; i++) {
    let btn = document.createElement('button');
    btn.className = 'lvl-btn';
    if (i > saveData.unlocked) btn.classList.add('locked');
    else if (saveData.bestTimes[i]) btn.classList.add('completed');
    if (i === selectedLevel) btn.classList.add('current');
    btn.textContent = 'Level ' + i;
    btn.onclick = () => { if (i <= saveData.unlocked) { selectedLevel = i; buildLevelSelect(); } };
    sel.appendChild(btn);
  }
}

function showStart() {
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  buildLevelSelect();
}

// ============= INIT LEVEL =============
function loadLevel(num) {
  if (num > TOTAL_LEVELS) { showStart(); return; }
  let data = LEVELS[num]();
  platforms = data.platforms.map(p => ({
    ...p, origX: p.x, origY: p.y, timer: 0,
    fallState: 0, fallVy: 0, shakeTimer: 0, stepped: false
  }));
  hazards = data.hazards.map(h => ({
    ...h, origX: h.x, origY: h.y, timer: 0,
    crushState: h.type === 'crusher' ? 'waiting' : null, crushY: h.y, crushWait: 0
  }));
  coins = data.coins.map(c => ({ ...c, collected: false, bobTimer: Math.random() * Math.PI * 2 }));
  goal = data.goal;
  player = createPlayer(data.start.x, data.start.y);
  checkpointX = data.start.x;
  checkpointY = data.start.y;
  camera = { x: 0, y: 0 };
  particles = [];
  floatingTexts = [];
  levelTime = 0;
  currentLevel = num;

  // Background layers
  bgLayers = [];
  if (data.bg === 'city') {
    bgLayers = [{ type: 'city', scroll: 0.2 }, { type: 'buildings', scroll: 0.4 }];
  } else if (data.bg === 'night') {
    bgLayers = [{ type: 'stars', scroll: 0.05 }, { type: 'moon', scroll: 0.1 }];
  } else if (data.bg === 'factory') {
    bgLayers = [{ type: 'gears', scroll: 0.15 }, { type: 'pipes', scroll: 0.3 }];
  } else if (data.bg === 'lava') {
    bgLayers = [{ type: 'lava_bg', scroll: 0.1 }, { type: 'rocks', scroll: 0.3 }];
  }
}

function startGame(level) {
  if (level > TOTAL_LEVELS) { showStart(); return; }
  if (level > saveData.unlocked) level = saveData.unlocked;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('deathScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  loadLevel(level);
  gameRunning = true;
  if (!loopRunning) { loopRunning = true; loop(); }
}

let loopRunning = false;

// ============= UPDATE =============
function updatePlayer() {
  if (player.dead) return;

  // Horizontal movement
  let moveDir = 0;
  if (keys['arrowleft'] || keys['a']) moveDir = -1;
  if (keys['arrowright'] || keys['d']) moveDir = 1;

  if (player.sliding) {
    player.slideTimer--;
    player.vx = player.facing * SLIDE_SPEED;
    if (player.slideTimer <= 0) {
      player.sliding = false;
      player.h = 44;
      player.y -= 20;
    }
  } else {
    player.vx = moveDir * MOVE_SPEED;
    if (moveDir !== 0) player.facing = moveDir;

    // Slide
    if ((keys['arrowdown'] || keys['s']) && player.onGround && Math.abs(player.vx) > 0) {
      player.sliding = true;
      player.slideTimer = 20;
      player.h = 24;
      player.y += 20;
    }
  }

  // Jump
  if (keys[' '] || keys['arrowup'] || keys['w']) {
    if (player.onGround && !player.jumping) {
      player.vy = JUMP_FORCE;
      player.jumping = true;
      player.onGround = false;
      spawnJumpParticles();
    } else if (!player.onGround && player.hasDoubleJump && !player.doubleJump && player.vy > -5) {
      player.vy = JUMP_FORCE * 0.85;
      player.doubleJump = true;
      spawnJumpParticles();
    }
    // Wall jump
    if (player.wallSliding) {
      player.vy = JUMP_FORCE * 0.9;
      player.vx = -player.facing * 8;
      player.facing = -player.facing;
      player.wallSliding = false;
      player.doubleJump = false;
      spawnJumpParticles();
    }
  }
  if (!keys[' '] && !keys['arrowup'] && !keys['w']) {
    player.jumping = false;
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Wall sliding
  player.wallSliding = false;
  if (!player.onGround && player.vy > 0) {
    for (let p of platforms) {
      if (p.wall) {
        if (player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h > p.y && player.y < p.y + p.h) {
          if (moveDir !== 0) {
            player.wallSliding = true;
            player.vy = Math.min(player.vy, 2);
            player.doubleJump = false;
          }
        }
      }
    }
  }

  // Apply velocity
  player.x += player.vx;
  player.y += player.vy;

  // Platform collision
  player.onGround = false;
  for (let p of platforms) {
    if (p.fallState === 2) continue; // fallen off screen
    let px = p.x, py = p.y;

    // Horizontal collision
    if (player.y + player.h > py + 4 && player.y < py + p.h - 4) {
      if (player.x + player.w > px && player.x + player.w < px + 10 && player.vx > 0) {
        player.x = px - player.w;
      }
      if (player.x < px + p.w && player.x > px + p.w - 10 && player.vx < 0) {
        player.x = px + p.w;
      }
    }

    // Vertical collision (land on top)
    if (player.x + player.w > px + 4 && player.x < px + p.w - 4) {
      if (player.vy >= 0 && player.y + player.h >= py && player.y + player.h <= py + player.vy + 10) {
        player.y = py - player.h;
        player.vy = 0;
        player.onGround = true;
        player.doubleJump = false;
        player.hasDoubleJump = true;

        // Falling platform trigger
        if (p.falling && !p.stepped) {
          p.stepped = true;
          p.shakeTimer = p.fallDelay || 30;
        }

        // Move with moving platform
        if (p.moving) {
          if (p.moveX) player.x += Math.cos(p.timer) * p.speed;
          if (p.moveY) player.y += Math.cos(p.timer) * p.speed;
        }
      }
      // Hit head on bottom
      if (player.vy < 0 && player.y <= py + p.h && player.y > py + p.h - 10) {
        player.y = py + p.h;
        player.vy = 0;
      }
    }
  }

  // Fell off screen
  if (player.y > H + 50) {
    killPlayer();
  }

  // Animation
  player.animTimer++;
  if (Math.abs(player.vx) > 0.5 && player.onGround) {
    if (player.animTimer % 6 === 0) player.animFrame = (player.animFrame + 1) % 4;
  } else if (!player.onGround) {
    player.animFrame = 5;
  } else {
    player.animFrame = 0;
  }

  // Trail particles
  player.trailTimer++;
  if (player.trailTimer % 3 === 0 && (Math.abs(player.vx) > 3 || Math.abs(player.vy) > 5)) {
    particles.push({
      x: player.x + player.w/2, y: player.y + player.h,
      vx: (Math.random()-0.5)*1, vy: (Math.random()-0.5)*1,
      life: 10, maxLife: 10, r: 3, color: 'rgba(255,255,255,0.3)'
    });
  }
}

function updatePlatforms() {
  for (let p of platforms) {
    if (p.moving) {
      p.timer += 0.02 * (p.speed || 1);
      if (p.moveX) p.x = p.origX + Math.sin(p.timer) * p.moveX;
      if (p.moveY) p.y = p.origY + Math.sin(p.timer) * p.moveY;
    }
    if (p.falling && p.stepped) {
      if (p.shakeTimer > 0) {
        p.shakeTimer--;
        p.x = p.origX + (Math.random()-0.5) * 4;
      } else if (p.fallState === 0) {
        p.fallState = 1;
        p.fallVy = 0;
      }
    }
    if (p.fallState === 1) {
      p.fallVy += 0.4;
      p.y += p.fallVy;
      if (p.y > H + 100) p.fallState = 2;
    }
  }
}

function updateHazards() {
  for (let h of hazards) {
    h.timer++;
    if (h.type === 'saw') {
      if (h.moveY) h.y = h.origY + Math.sin(h.timer * 0.02 * (h.speed||1)) * h.moveY;
      if (h.moveX) h.x = h.origX + Math.sin(h.timer * 0.02 * (h.speed||1)) * h.moveX;
    }
    if (h.type === 'crusher') {
      if (h.crushState === 'waiting') {
        h.crushWait++;
        if (h.crushWait >= (h.crushDelay||90)) { h.crushState = 'falling'; h.crushWait = 0; }
      } else if (h.crushState === 'falling') {
        h.crushY += (h.crushSpeed||3);
        if (h.crushY > H - 60) { h.crushState = 'rising'; }
      } else if (h.crushState === 'rising') {
        h.crushY -= 1.5;
        if (h.crushY <= h.origY) { h.crushY = h.origY; h.crushState = 'waiting'; }
      }
    }
  }
}

function checkHazards() {
  if (player.dead) return;
  for (let h of hazards) {
    if (h.type === 'spikes') {
      if (player.x+player.w > h.x && player.x < h.x+h.w && player.y+player.h > h.y && player.y < h.y+h.h) {
        killPlayer(); return;
      }
    }
    if (h.type === 'lava') {
      if (player.x+player.w > h.x && player.x < h.x+h.w && player.y+player.h > h.y) {
        killPlayer(); return;
      }
    }
    if (h.type === 'saw') {
      let dx = (player.x+player.w/2) - h.x, dy = (player.y+player.h/2) - h.y;
      let dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < (h.r||20) + 15) { killPlayer(); return; }
    }
    if (h.type === 'crusher') {
      if (player.x+player.w > h.x && player.x < h.x+h.w && player.y+player.h > h.crushY && player.y < h.crushY+h.h) {
        killPlayer(); return;
      }
    }
    if (h.type === 'laser') {
      let cycle = h.laserCycle || 120;
      let onTime = h.laserOn || 60;
      if (h.timer % cycle < onTime) {
        if (player.x+player.w > h.x && player.x < h.x + (h.w||10) &&
            player.y+player.h > h.y && player.y < h.y + (h.laserLen||300)) {
          killPlayer(); return;
        }
      }
    }
  }
}

function checkCoins() {
  for (let c of coins) {
    if (c.collected) continue;
    c.bobTimer += 0.05;
    let cx = c.x, cy = c.y + Math.sin(c.bobTimer) * 4;
    let dx = (player.x+player.w/2) - cx, dy = (player.y+player.h/2) - cy;
    if (Math.sqrt(dx*dx+dy*dy) < c.r + 18) {
      c.collected = true;
      floatingTexts.push({ x: cx, y: cy, text: '+10', life: 30, maxLife: 30, color: '#FFD700' });
      for (let i = 0; i < 8; i++) {
        let a = Math.random()*Math.PI*2;
        particles.push({ x: cx, y: cy, vx: Math.cos(a)*3, vy: Math.sin(a)*3, life: 15, maxLife: 15, r: 3, color: '#FFD700' });
      }
    }
  }
}

function checkGoal() {
  if (player.dead) return;
  if (player.x+player.w > goal.x && player.x < goal.x+goal.w && player.y+player.h > goal.y && player.y < goal.y+goal.h) {
    winLevel();
  }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  deathCount++;
  for (let i = 0; i < 20; i++) {
    let a = Math.random()*Math.PI*2, s = 2+Math.random()*4;
    particles.push({ x: player.x+player.w/2, y: player.y+player.h/2, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 25, maxLife: 25, r: 3+Math.random()*3, color: ['#ff4444','#ffaa00','#fff'][Math.floor(Math.random()*3)] });
  }
  setTimeout(() => {
    document.getElementById('deathLevel').textContent = currentLevel;
    document.getElementById('deathMsg').textContent = 'Deaths: ' + deathCount;
    document.getElementById('deathScreen').classList.remove('hidden');
    gameRunning = false;
  }, 600);
}

function winLevel() {
  gameRunning = false;
  let timeStr = (levelTime / 60).toFixed(1) + 's';
  if (!saveData.bestTimes[currentLevel] || levelTime < saveData.bestTimes[currentLevel]) {
    saveData.bestTimes[currentLevel] = levelTime;
  }
  if (currentLevel >= saveData.unlocked && currentLevel < TOTAL_LEVELS) {
    saveData.unlocked = currentLevel + 1;
  }
  save();
  document.getElementById('winLevel').textContent = currentLevel;
  document.getElementById('winTime').textContent = 'Time: ' + timeStr + (saveData.bestTimes[currentLevel] === levelTime ? ' (New best!)' : '');
  document.getElementById('nextBtn').style.display = currentLevel < TOTAL_LEVELS ? 'inline-block' : 'none';
  document.getElementById('winScreen').classList.remove('hidden');
  // Win particles
  for (let i = 0; i < 30; i++) {
    let a = Math.random()*Math.PI*2, s = 2+Math.random()*5;
    particles.push({ x: player.x+player.w/2, y: player.y+player.h/2, vx: Math.cos(a)*s, vy: Math.sin(a)*s-3, life: 40, maxLife: 40, r: 3+Math.random()*4, color: ['#44ff66','#FFD700','#44ddff','#ff44aa'][Math.floor(Math.random()*4)] });
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: player.x + player.w/2 + (Math.random()-0.5)*20,
      y: player.y + player.h,
      vx: (Math.random()-0.5)*3, vy: 1+Math.random()*2,
      life: 12, maxLife: 12, r: 2+Math.random()*2, color: 'rgba(200,200,200,0.5)'
    });
  }
}

function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floatingTexts.length-1; i >= 0; i--) {
    floatingTexts[i].y -= 1.5;
    floatingTexts[i].life--;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}

function updateCamera() {
  let targetX = player.x - W/3;
  let targetY = player.y - H/2;
  camera.x += (targetX - camera.x) * 0.08;
  camera.y += (targetY - camera.y) * 0.05;
  if (camera.y > 0) camera.y = 0;
  if (camera.x < 0) camera.x = 0;
}

// ============= CARTOON DRAWING =============
// Helper: draw rounded rect with thick outline
function cartoonRect(x,y,w,h,r,fill,stroke,lw) {
  ctx.fillStyle=fill; ctx.strokeStyle=stroke||'#222'; ctx.lineWidth=lw||3; ctx.lineJoin='round';
  ctx.beginPath(); r=Math.min(r||6,w/2,h/2);
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  ctx.fill();ctx.stroke();
}
// Helper: cartoon circle with outline
function cartoonCircle(x,y,r,fill,stroke,lw) {
  ctx.fillStyle=fill;ctx.strokeStyle=stroke||'#222';ctx.lineWidth=lw||3;
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
}

function drawBackground() {
  let bg = bgLayers;
  let grad;
  if (bg[0] && bg[0].type === 'lava_bg') {
    grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#ff6633'); grad.addColorStop(0.5, '#cc3300'); grad.addColorStop(1, '#991100');
  } else if (bg[0] && bg[0].type === 'stars') {
    grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#1a1a4a'); grad.addColorStop(1, '#2a2a6a');
  } else if (bg[0] && bg[0].type === 'gears') {
    grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#3a3a4a'); grad.addColorStop(1, '#4a4a5a');
  } else {
    grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0, '#55aaff'); grad.addColorStop(0.6, '#88ccff'); grad.addColorStop(1, '#aaddff');
  }
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  for (let layer of bg) {
    let ox = -camera.x * layer.scroll;
    ctx.save();
    if (layer.type === 'stars') {
      // Cartoon stars - 4-pointed
      for (let i = 0; i < 40; i++) {
        let sx = ((i*73+ox*0.3)%W+W)%W, sy = (i*37)%H*0.7;
        let ss = 3+Math.sin(levelTime*0.03+i)*1.5;
        ctx.fillStyle = '#ffffaa';
        ctx.save(); ctx.translate(sx,sy); ctx.rotate(levelTime*0.01+i);
        ctx.beginPath();
        for(let p=0;p<4;p++){let a=p*Math.PI/2;ctx.lineTo(Math.cos(a)*ss,Math.sin(a)*ss);ctx.lineTo(Math.cos(a+Math.PI/4)*ss*0.3,Math.sin(a+Math.PI/4)*ss*0.3);}
        ctx.closePath();ctx.fill();ctx.restore();
      }
    }
    if (layer.type === 'moon') {
      // Cartoon moon with face
      let mx=((W*0.8+ox*0.5)%W+W)%W;
      cartoonCircle(mx, 80, 35, '#ffffcc', '#ddddaa', 3);
      // Moon face
      ctx.fillStyle='#cccc88';ctx.beginPath();ctx.arc(mx+8,75,10,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(mx-5,90,6,0,Math.PI*2);ctx.fill();
    }
    if (layer.type === 'city' || layer.type === 'buildings') {
      let bh = layer.type === 'city' ? 0.3 : 0.5;
      let bw = layer.type === 'city' ? 80 : 50;
      let colors = ['#6688bb','#5577aa','#7799cc','#4466aa','#5588bb'];
      for (let i = 0; i < 15; i++) {
        let bx = ((i*bw*1.5 + ox)%(W+bw*20)+W+bw*20)%(W+bw*20) - bw*2;
        let by = H - (i%5+2)*30*bh;
        cartoonRect(bx, by, bw-5, H-by, 4, colors[i%5], '#334466', 2);
        // Cartoon windows - yellow squares with outlines
        if (layer.type === 'buildings') {
          for (let wy = by+10; wy < H-25; wy += 20) {
            for (let wx = bx+8; wx < bx+bw-16; wx += 14) {
              if ((i+wx+wy)%3!==0) cartoonRect(wx,wy,8,8,2,'#ffee55','#ccaa22',1.5);
            }
          }
        }
      }
    }
    if (layer.type === 'gears') {
      // Cartoon gears with thick outlines
      for (let i = 0; i < 5; i++) {
        let gx = ((i*200+ox)%(W+800)+W+800)%(W+800) - 100;
        let gr = 40+i*10;
        ctx.save();ctx.translate(gx,100+i*80);ctx.rotate(levelTime*0.005*(i%2?1:-1));
        ctx.fillStyle='#667788';ctx.strokeStyle='#445566';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(0,0,gr,0,Math.PI*2);ctx.fill();ctx.stroke();
        ctx.fillStyle='#778899';
        for(let t=0;t<8;t++){let a=t*Math.PI/4;ctx.beginPath();ctx.moveTo(Math.cos(a)*gr*0.8,Math.sin(a)*gr*0.8);ctx.lineTo(Math.cos(a-0.25)*gr*1.2,Math.sin(a-0.25)*gr*1.2);ctx.lineTo(Math.cos(a+0.25)*gr*1.2,Math.sin(a+0.25)*gr*1.2);ctx.closePath();ctx.fill();ctx.stroke();}
        cartoonCircle(0,0,gr*0.25,'#556677','#445566',2);
        ctx.restore();
      }
    }
    if (layer.type === 'lava_bg') {
      // Cartoon bubbly lava glow
      let lavaGrad = ctx.createLinearGradient(0, H-100, 0, H);
      lavaGrad.addColorStop(0, 'rgba(255,100,0,0)');
      lavaGrad.addColorStop(1, 'rgba(255,150,0,0.5)');
      ctx.fillStyle = lavaGrad; ctx.fillRect(0, H-100, W, 100);
      // Lava bubbles in background
      for(let i=0;i<8;i++){
        let bx=((i*130+levelTime*0.5+ox)%W+W)%W, by=H-20-Math.abs(Math.sin(levelTime*0.02+i*2))*30;
        cartoonCircle(bx,by,5+Math.sin(levelTime*0.03+i)*2,'#ff8800','#cc5500',2);
      }
    }
    // Cartoon clouds for non-lava, non-factory
    if (layer.type === 'city' || layer.type === 'buildings' || layer.type === 'moon') {
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      for(let i=0;i<6;i++){
        let cx=((i*180+ox*0.8+50)%(W+200)+W+200)%(W+200)-50;
        let cy=30+i*22;let cr=18+i*3;
        ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx-cr*0.7,cy+4,cr*0.7,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+cr*0.7,cy+4,cr*0.8,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.restore();
  }
}

function drawPlatforms() {
  for (let p of platforms) {
    if (p.fallState === 2) continue;
    let x = p.x - camera.x, y = p.y - camera.y;
    if (x + p.w < -50 || x > W + 50) continue;

    if (p.wall) {
      // Cartoon brick wall
      cartoonRect(x, y, p.w, p.h, 3, '#8888aa', '#555577', 3);
      ctx.strokeStyle = '#666688'; ctx.lineWidth = 2;
      for (let by = 0; by < p.h; by += 16) {
        let off = (Math.floor(by/16)%2) * 11;
        for (let bx = off; bx < p.w-2; bx += 22) {
          cartoonRect(x+bx+1, y+by+1, Math.min(20,p.w-bx-2), 14, 2, '#9999bb', '#777799', 1.5);
        }
      }
    } else {
      // Cartoon platform - rounded with grass on top
      let mainColor = p.falling ? (p.shakeTimer > 0 ? '#dd8844' : '#cc7733') : '#66bb44';
      let darkColor = p.falling ? '#aa6622' : '#449922';
      let topColor = p.falling ? '#ffaa55' : '#88dd55';

      // Main body with thick outline
      cartoonRect(x, y, p.w, p.h, 6, mainColor, '#333', 3);
      // Highlight on top
      ctx.fillStyle = topColor;
      ctx.beginPath();
      let r = Math.min(6, p.w/2);
      ctx.moveTo(x+r, y); ctx.lineTo(x+p.w-r, y); ctx.quadraticCurveTo(x+p.w,y,x+p.w,y+r);
      ctx.lineTo(x+p.w, y+5); ctx.lineTo(x, y+5); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.closePath(); ctx.fill();

      // Cartoon grass tufts on normal platforms
      if (!p.falling && p.h >= 15) {
        ctx.fillStyle = '#77dd33';
        for (let gx = 3; gx < p.w-3; gx += 8) {
          ctx.beginPath();
          ctx.moveTo(x+gx, y); ctx.lineTo(x+gx+2, y-5-Math.sin(gx)*2); ctx.lineTo(x+gx+4, y);
          ctx.closePath(); ctx.fill();
        }
      }

      // Warning for falling platforms - cartoon exclamation
      if (p.falling && !p.stepped) {
        ctx.fillStyle = '#ff4400'; ctx.strokeStyle = '#aa2200'; ctx.lineWidth = 2;
        ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
        ctx.strokeText('!', x+p.w/2, y-6); ctx.fillText('!', x+p.w/2, y-6);
      }
      if (p.falling && p.shakeTimer > 0) {
        // Crack lines
        ctx.strokeStyle = '#aa4400'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x+p.w*0.3,y+2); ctx.lineTo(x+p.w*0.5,y+p.h*0.6); ctx.lineTo(x+p.w*0.7,y+3); ctx.stroke();
      }
    }
  }
}

function drawHazards() {
  for (let h of hazards) {
    let x = h.x - camera.x, y = h.y - camera.y;

    if (h.type === 'spikes') {
      // Cartoon spikes - bright red with thick outlines
      for (let sx = 0; sx < h.w; sx += 14) {
        ctx.fillStyle = '#ff4444';
        ctx.strokeStyle = '#aa0000'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(x+sx, y+h.h); ctx.lineTo(x+sx+7, y-2); ctx.lineTo(x+sx+14, y+h.h);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        // Shine
        ctx.fillStyle = '#ff8888';
        ctx.beginPath(); ctx.moveTo(x+sx+5,y+h.h*0.5); ctx.lineTo(x+sx+7,y+2); ctx.lineTo(x+sx+8,y+h.h*0.5); ctx.closePath(); ctx.fill();
      }
    }
    if (h.type === 'lava') {
      // Cartoon lava - bubbly and bright
      cartoonRect(x, y, h.w, h.h+5, 4, '#ff4400', '#cc2200', 3);
      // Wavy surface
      ctx.fillStyle = '#ff7700'; ctx.strokeStyle = '#cc4400'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x, y+5);
      for (let lx = 0; lx <= h.w; lx += 15) {
        let ly = Math.sin((lx + levelTime * 2) * 0.06) * 5;
        ctx.lineTo(x + lx, y + ly);
      }
      ctx.lineTo(x+h.w, y+10); ctx.lineTo(x, y+10); ctx.closePath(); ctx.fill(); ctx.stroke();
      // Bright yellow highlights
      ctx.fillStyle = '#ffcc00';
      for (let lx = 8; lx < h.w-8; lx += 25) {
        let ly = Math.sin((lx + levelTime * 2.5) * 0.05) * 3;
        cartoonCircle(x+lx, y+ly-1, 4+Math.sin(levelTime*0.04+lx)*1.5, '#ffcc00', '#ff8800', 1.5);
      }
      // Cartoon bubbles popping
      for(let i=0;i<3;i++){
        let bx=x+((i*97+levelTime*1.5)%h.w), by=y-5-Math.abs(Math.sin(levelTime*0.04+i*3))*12;
        if(Math.sin(levelTime*0.02+i*5)>0) cartoonCircle(bx,by,3+Math.sin(levelTime*0.05+i)*1,'#ffaa44','#cc6600',1.5);
      }
    }
    if (h.type === 'saw') {
      let sr = h.r || 20;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(levelTime * 0.1);
      // Cartoon saw - bright with thick outline and angry face
      ctx.fillStyle = '#cccccc'; ctx.strokeStyle = '#555'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, sr, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      // Big cartoon teeth
      ctx.fillStyle = '#eeeeee'; ctx.strokeStyle = '#666'; ctx.lineWidth = 2;
      for (let t = 0; t < 10; t++) {
        let a = t * Math.PI / 5;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*sr*0.75, Math.sin(a)*sr*0.75);
        ctx.lineTo(Math.cos(a-0.18)*sr*1.15, Math.sin(a-0.18)*sr*1.15);
        ctx.lineTo(Math.cos(a+0.18)*sr*1.15, Math.sin(a+0.18)*sr*1.15);
        ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      // Center hub
      cartoonCircle(0, 0, sr*0.35, '#ff4444', '#aa0000', 2.5);
      // Angry cartoon eyes on saw
      ctx.save(); ctx.rotate(-levelTime*0.1); // counter-rotate so face stays upright
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-sr*0.15,-sr*0.08,sr*0.12,sr*0.14,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(sr*0.15,-sr*0.08,sr*0.12,sr*0.14,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-sr*0.12,-sr*0.08,sr*0.06,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sr*0.18,-sr*0.08,sr*0.06,0,Math.PI*2);ctx.fill();
      // Angry eyebrows
      ctx.strokeStyle='#222';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(-sr*0.25,-sr*0.22);ctx.lineTo(-sr*0.05,-sr*0.18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sr*0.25,-sr*0.22);ctx.lineTo(sr*0.05,-sr*0.18);ctx.stroke();
      // Evil grin
      ctx.strokeStyle='#222';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,sr*0.08,sr*0.15,0.2,Math.PI-0.2);ctx.stroke();
      ctx.restore();
      ctx.restore();
    }
    if (h.type === 'crusher') {
      let cy = h.crushY - camera.y;
      // Cartoon crusher - big block with face
      cartoonRect(x-2, 0, h.w+4, cy+h.h, 4, '#8888aa', '#444', 3);
      // Danger stripes
      for (let sy = 0; sy < h.h; sy += 14) {
        ctx.fillStyle = sy%28<14 ? '#ffcc00' : '#222';
        ctx.fillRect(x+3, cy+sy, h.w-6, 12);
      }
      // Cartoon teeth on bottom
      ctx.fillStyle = '#dddddd'; ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
      for (let cx2 = 0; cx2 < h.w; cx2 += 12) {
        ctx.beginPath();
        ctx.moveTo(x+cx2, cy+h.h); ctx.lineTo(x+cx2+6, cy+h.h+10); ctx.lineTo(x+cx2+12, cy+h.h);
        ctx.closePath(); ctx.fill(); ctx.stroke();
      }
      // Angry face on crusher
      let fy=cy+h.h*0.4;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x+h.w*0.3,fy,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(x+h.w*0.7,fy,5,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(x+h.w*0.3,fy,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+h.w*0.7,fy,3,0,Math.PI*2);ctx.fill();
    }
    if (h.type === 'laser') {
      let cycle = h.laserCycle || 120;
      let onTime = h.laserOn || 60;
      let isOn = h.timer % cycle < onTime;
      let warning = h.timer % cycle > cycle - 30;

      // Cartoon emitter box
      cartoonRect(x-5, y-8, (h.w||10)+10, 16, 4, isOn?'#ff2222':'#884444', '#333', 3);
      // Lens
      cartoonCircle(x+(h.w||10)/2, y, 5, isOn?'#ff0000':'#662222', '#333', 2);

      if (isOn) {
        let len = h.laserLen || 300;
        // Cartoon beam - wider with outline
        ctx.fillStyle = '#ff0000'; ctx.strokeStyle = '#cc0000'; ctx.lineWidth = 2;
        ctx.fillRect(x-1, y+8, (h.w||10)+2, len);
        ctx.strokeRect(x-1, y+8, (h.w||10)+2, len);
        // Bright core
        ctx.fillStyle = '#ff8888';
        ctx.fillRect(x+2, y+8, (h.w||10)-4, len);
        // Cartoon zap effects along beam
        ctx.strokeStyle = '#ffaaaa'; ctx.lineWidth = 1.5;
        for(let zy=20;zy<len;zy+=30){
          ctx.beginPath();ctx.moveTo(x-3,y+8+zy);ctx.lineTo(x+6,y+8+zy+5);ctx.lineTo(x-2,y+8+zy+10);ctx.stroke();
          ctx.beginPath();ctx.moveTo(x+(h.w||10)+3,y+8+zy+15);ctx.lineTo(x+(h.w||10)-4,y+8+zy+20);ctx.lineTo(x+(h.w||10)+2,y+8+zy+25);ctx.stroke();
        }
      } else if (warning) {
        if (Math.floor(h.timer/5) % 2 === 0) {
          ctx.fillStyle = 'rgba(255,50,50,0.25)';
          ctx.fillRect(x, y+8, h.w||10, h.laserLen||300);
        }
      }
    }
  }
}

function drawCoins() {
  for (let c of coins) {
    if (c.collected) continue;
    let x = c.x - camera.x, y = c.y + Math.sin(c.bobTimer)*5 - camera.y;
    // Squash & stretch
    let stretch = 1 + Math.sin(c.bobTimer)*0.1;
    ctx.save(); ctx.translate(x,y); ctx.scale(1/stretch, stretch);
    // Cartoon coin with big outline
    cartoonCircle(0, 0, c.r+1, '#FFD700', '#CC9900', 3);
    // Dollar sign or star
    ctx.fillStyle = '#ffee66'; ctx.font = 'bold '+(c.r)+'px Arial'; ctx.textAlign = 'center';
    ctx.fillText('$', 0, c.r*0.4);
    // Cartoon shine - star shape
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(-c.r*0.3, -c.r*0.3, c.r*0.3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawGoal() {
  let x = goal.x - camera.x, y = goal.y - camera.y;
  // Cartoon flag pole
  cartoonRect(x+goal.w/2-3, y-25, 6, goal.h+25, 2, '#888', '#555', 2);
  // Cartoon flag - wavy with outline
  let wave = Math.sin(levelTime*0.1)*5;
  ctx.fillStyle = '#44ff66'; ctx.strokeStyle = '#22aa44'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(x+goal.w/2+3, y-20);
  ctx.quadraticCurveTo(x+goal.w/2+15+wave, y-18, x+goal.w/2+28+wave, y-10);
  ctx.quadraticCurveTo(x+goal.w/2+15-wave, y-5, x+goal.w/2+3, y+2);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Star on flag
  ctx.fillStyle='#ffffaa'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('\u2605', x+goal.w/2+15+wave*0.5, y-7);
  // Cartoon glow ring
  ctx.strokeStyle = `rgba(68,255,102,${0.3+Math.sin(levelTime*0.06)*0.2})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(x+goal.w/2, y+goal.h/2, 25+Math.sin(levelTime*0.05)*5, 0, Math.PI*2); ctx.stroke();
  // Sparkles
  for(let i=0;i<4;i++){
    let a=levelTime*0.04+i*Math.PI/2, d=30+Math.sin(levelTime*0.06+i)*8;
    ctx.fillStyle='#ffffaa';ctx.beginPath();ctx.arc(x+goal.w/2+Math.cos(a)*d,y+goal.h/2+Math.sin(a)*d,2+Math.sin(levelTime*0.1+i),0,Math.PI*2);ctx.fill();
  }
}

function drawPlayer() {
  if (player.dead) return;
  let x = player.x - camera.x, y = player.y - camera.y;

  // Squash & stretch effect
  let squashX = 1, squashY = 1;
  if (!player.onGround && player.vy < -3) { squashX = 0.85; squashY = 1.2; } // jumping up = stretch tall
  else if (!player.onGround && player.vy > 5) { squashX = 1.15; squashY = 0.85; } // falling = squash wide
  else if (player.onGround && Math.abs(player.vx) > 3) { squashX = 1.05; squashY = 0.95; } // running = slight squash

  ctx.save();
  ctx.translate(x + player.w/2, y + player.h/2);
  ctx.scale(squashX, squashY);
  if (player.facing === -1) ctx.scale(-1, 1);

  if (player.sliding) {
    // Cartoon slide pose
    cartoonRect(-18, -6, 36, 16, 8, '#222', '#000', 3);
    // Head
    cartoonCircle(-8, -8, 10, '#6B4226', '#3a2010', 3);
    // Eye
    ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-3,-10,4,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-1,-10,2.5,0,Math.PI*2);ctx.fill();
    // Determined mouth
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-5,-4);ctx.lineTo(1,-4);ctx.stroke();
    // Speed lines
    ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(15+i*6,-3+i*3);ctx.lineTo(22+i*6,-3+i*3);ctx.stroke();}
  } else {
    // === CARTOON CHARACTER ===
    // Legs with animation
    let legAnim = player.onGround ? Math.sin(player.animTimer * 0.35) * (Math.abs(player.vx) > 0.5 ? 10 : 0) : -4;
    // Left leg
    ctx.save(); ctx.translate(-5, 12); ctx.rotate(legAnim*0.06);
    cartoonRect(-4, 0, 8, 13, 3, '#333355', '#222', 2.5);
    // Left shoe
    cartoonRect(-5, 11, 10, 5, 3, '#ee3333', '#aa0000', 2);
    ctx.restore();
    // Right leg
    ctx.save(); ctx.translate(5, 12); ctx.rotate(-legAnim*0.06);
    cartoonRect(-4, 0, 8, 13, 3, '#333355', '#222', 2.5);
    // Right shoe
    cartoonRect(-5, 11, 10, 5, 3, '#ee3333', '#aa0000', 2);
    ctx.restore();

    // Body - round torso
    cartoonRect(-10, -10, 20, 24, 6, '#222', '#000', 3);
    // Shirt detail
    ctx.fillStyle='#444';ctx.fillRect(-6,-4,12,2);

    // Arms
    let armAnim = player.onGround ? -legAnim : 6;
    ctx.save(); ctx.translate(-10, -4); ctx.rotate(armAnim*0.05);
    cartoonRect(-2, -1, 6, 15, 3, '#6B4226', '#3a2010', 2.5);
    // Hand
    cartoonCircle(1, 14, 3.5, '#6B4226', '#3a2010', 2);
    ctx.restore();
    ctx.save(); ctx.translate(10, -4); ctx.rotate(-armAnim*0.05);
    cartoonRect(-4, -1, 6, 15, 3, '#6B4226', '#3a2010', 2.5);
    cartoonCircle(-1, 14, 3.5, '#6B4226', '#3a2010', 2);
    ctx.restore();

    // Head - big cartoon head
    cartoonCircle(0, -18, 13, '#6B4226', '#3a2010', 3);

    // Hair - puffy cartoon hair
    ctx.fillStyle = '#222'; ctx.strokeStyle = '#000'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(0, -22, 13, Math.PI+0.2, -0.2);
    ctx.quadraticCurveTo(14,-28,10,-35);
    ctx.quadraticCurveTo(5,-30,0,-34);
    ctx.quadraticCurveTo(-5,-30,-10,-35);
    ctx.quadraticCurveTo(-14,-28,-13,-22);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Big cartoon eyes
    ctx.fillStyle='#fff'; ctx.strokeStyle='#222'; ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(-4,-19,5,6,-0.1,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.ellipse(6,-19,5,6,0.1,0,Math.PI*2);ctx.fill();ctx.stroke();
    // Pupils - look in movement direction
    let pupilOff = Math.min(2, player.vx * 0.3);
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(-3+pupilOff,-19,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(7+pupilOff,-19,2.5,0,Math.PI*2);ctx.fill();
    // Eye shine
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-4+pupilOff,-20.5,1.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6+pupilOff,-20.5,1.2,0,Math.PI*2);ctx.fill();

    // Eyebrows - expressive
    ctx.strokeStyle='#222';ctx.lineWidth=2.5;
    if(!player.onGround && player.vy < 0) {
      // Excited eyebrows (raised)
      ctx.beginPath();ctx.moveTo(-8,-27);ctx.quadraticCurveTo(-4,-30,0,-27);ctx.stroke();
      ctx.beginPath();ctx.moveTo(3,-27);ctx.quadraticCurveTo(7,-30,11,-27);ctx.stroke();
    } else {
      // Normal eyebrows
      ctx.beginPath();ctx.moveTo(-8,-25);ctx.quadraticCurveTo(-4,-27,0,-25);ctx.stroke();
      ctx.beginPath();ctx.moveTo(3,-25);ctx.quadraticCurveTo(7,-27,11,-25);ctx.stroke();
    }

    // Mouth
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';
    if (!player.onGround && player.vy < -5) {
      // Excited open mouth
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(2,-12,4,3,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#3a2010';ctx.stroke();
    } else if (!player.onGround && player.vy > 5) {
      // Scared mouth
      ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(2,-11,3,4,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#3a2010';ctx.stroke();
    } else if (Math.abs(player.vx) > 2) {
      // Running grin
      ctx.beginPath();ctx.arc(2,-12,4,0.1,Math.PI-0.1);ctx.stroke();
    } else {
      // Idle smile
      ctx.beginPath();ctx.arc(2,-12,3,0.2,Math.PI-0.2);ctx.stroke();
    }
    ctx.lineCap='butt';

    // Wall slide sparks
    if (player.wallSliding) {
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle=['#ffdd44','#ffaa22','#ff8800','#ffee66'][i];
        ctx.beginPath();ctx.arc((Math.random()-0.5)*8, 8+i*5, 2+Math.random()*2, 0, Math.PI*2);ctx.fill();
      }
    }

    // Double jump ring
    if (!player.onGround && !player.doubleJump && player.hasDoubleJump) {
      ctx.strokeStyle='#44ddff';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(0, player.h/2+5, 10+Math.sin(levelTime*0.1)*2, 0, Math.PI*2);ctx.stroke();
      // Small sparkles
      for(let i=0;i<3;i++){let a=levelTime*0.08+i*Math.PI*2/3;ctx.fillStyle='#aaeeff';ctx.beginPath();ctx.arc(Math.cos(a)*11,player.h/2+5+Math.sin(a)*11,2,0,Math.PI*2);ctx.fill();}
    }
  }

  ctx.restore();
}

function drawParticles() {
  for (let p of particles) {
    let a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    // Cartoon particles - circles with outlines
    ctx.fillStyle = p.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(p.x - camera.x, p.y - camera.y, p.r * a + 1, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (let ft of floatingTexts) {
    let a = ft.life / ft.maxLife;
    ctx.globalAlpha = a;
    let scale = 1 + (1-a)*0.3; // Pop in effect
    ctx.save();
    ctx.translate(ft.x - camera.x, ft.y - camera.y);
    ctx.scale(scale, scale);
    // Text with outline
    ctx.fillStyle = ft.color;
    ctx.strokeStyle = '#222'; ctx.lineWidth = 3;
    ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
    ctx.strokeText(ft.text, 0, 0);
    ctx.fillText(ft.text, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // Cartoon HUD box
  cartoonRect(8, 8, 190, 40, 10, 'rgba(0,0,0,0.6)', '#ffcc00', 3);
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
  ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left';
  ctx.strokeText('Level ' + currentLevel, 20, 34);
  ctx.fillText('Level ' + currentLevel, 20, 34);
  ctx.fillStyle = '#aaeeff'; ctx.font = 'bold 14px Arial';
  ctx.fillText((levelTime/60).toFixed(1) + 's', 108, 34);

  // Coins
  let total = coins.length, got = coins.filter(c=>c.collected).length;
  ctx.fillStyle = '#FFD700'; ctx.font = 'bold 15px Arial';
  ctx.strokeText(got + '/' + total, 160, 34);
  ctx.fillText(got + '/' + total, 160, 34);

  // Deaths counter
  if (deathCount > 0) {
    cartoonRect(8, 52, 110, 28, 8, 'rgba(0,0,0,0.6)', '#ff4444', 2);
    ctx.fillStyle = '#ff6666'; ctx.font = 'bold 14px Arial';
    ctx.fillText('Deaths: ' + deathCount, 18, 71);
  }
}

// ============= MAIN LOOP =============
function loop() {
  if (gameRunning) {
    levelTime++;
    updatePlayer();
    updatePlatforms();
    updateHazards();
    checkHazards();
    checkCoins();
    checkGoal();
    updateCamera();
  }
  updateParticles();

  // Draw
  drawBackground();
  ctx.save();
  drawPlatforms();
  drawHazards();
  drawCoins();
  drawGoal();
  drawPlayer();
  drawParticles();
  ctx.restore();
  drawHUD();

  requestAnimationFrame(loop);
}

// Init
buildLevelSelect();
updateCoinDisplays();
function updateCoinDisplays() {}
</script>
